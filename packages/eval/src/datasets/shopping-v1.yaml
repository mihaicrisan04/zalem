# shopping-v1 — first eval dataset for the zalem advisor
#
# 25 rows covering 6 categories. multi_turn (3 rows) is deferred to v2 —
# Promptfoo's conversation feature requires extra wiring; reallocated those
# slots to simple_qa (+2) and product_validation (+1) so the v1 distribution
# is: 6 simple_qa + 5 product_validation + 5 comparison + 5 recommendation +
# 3 review_summary + 1 edge_case = 25.
#
# rules (see docs/eval-system-plan.md § "dataset design"):
#   - every productId references a real seeded product (verified 2026-05-09)
#   - bumping the dataset means bumping the filename to shopping-v2.yaml
#   - edge cases include ambiguous phrasing and off-topic queries
#
# vars consumed by the provider + scorers:
#   question                — interpolated into the prompt template
#   productId               — simulates "viewing this product" context
#   recentlyViewedIds       — recently-viewed list passed to advisor
#   expectedTools           — tool-call-f1 reference set
#   expectedProductIds      — IDs the answer should reference
#   forbiddenTools          — tools that MUST NOT fire
#   maxAcceptableToolCalls  — toolCallEfficiency budget cap
#   category                — for per-category breakdowns in the thesis
#   checkReviewFidelity     — opt into reviewThemeFidelity scorer

# ============================================================
# simple_qa (6)
# ============================================================

- description: simple_qa — price + discount on a Vivo V9
  vars:
    question: "What's the price of this phone, and is there a discount?"
    productId: "k173zdb98bz7zpncnnd4w3r9w183gq87"
    expectedTools: ["getProductDetails"]
    expectedProductIds: ["k173zdb98bz7zpncnnd4w3r9w183gq87"]
