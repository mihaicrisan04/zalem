# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
#
# zalem shopping advisor — eval sweep config
#
# this file is intentionally the only Promptfoo config in the repo. every
# scorer, dataset, and provider is referenced from here. run with:
#   bun --filter @zalem/eval eval         # one-off
#   bun --filter @zalem/eval eval:sweep   # full 9-config matrix, no cache
#   bun --filter @zalem/eval eval:view    # local web UI

description: zalem shopping advisor — model and prompt sweep

# -------------------------------------------------------------------
# providers
# -------------------------------------------------------------------
# each provider is the same custom JS shim (advisorProvider.ts) but
# instantiated with a different per-run config. Promptfoo runs the
# cartesian product (tests × providers) automatically.
#
# uncomment the additional 8 providers once phase 8.4 lands. for the
# initial smoke run we keep just one to keep latency / cost low.
# -------------------------------------------------------------------
providers:
  - id: file://src/providers/advisorProvider.ts
    label: gpt-oss-120b-medium
    config:
      modelId: openai/gpt-oss-120b
      reasoningEffort: medium
      maxSteps: 12
      promptVariant: current
      providerOrder: ["cerebras", "groq"]

  # - id: file://src/providers/advisorProvider.ts
