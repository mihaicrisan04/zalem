# -------------------------------------------------------------------
# prompts
# -------------------------------------------------------------------
# the user-facing question is interpolated from each row's vars. our
# system prompt and few-shot examples are NOT defined here — they live
# inside the Convex agent (so the eval tests the real production path).
# -------------------------------------------------------------------
prompts:
  - "{{question}}"

# -------------------------------------------------------------------
# defaultTest — assertions applied to every row
# -------------------------------------------------------------------
# row-specific assertions go in the dataset YAML under each row's
# `assert:` block; those compose with these.
# -------------------------------------------------------------------
defaultTest:
  assert:
    # programmatic, free, deterministic
    - type: javascript
      value: file://src/scorers/hasFinalAnswer.ts
    - type: javascript
      value: file://src/scorers/groundedness.ts
    - type: javascript
      value: file://src/scorers/factuality.ts
    - type: javascript
      value: file://src/scorers/toolCallEfficiency.ts
    - type: javascript
      value: file://src/scorers/expectedToolCoverage.ts
    - type: javascript
      value: file://src/scorers/reviewThemeFidelity.ts

    # LLM-as-judge — Claude Haiku 4.5 (cross-family from gpt-oss + gemini)
    # uncomment in phase 8.4 once judge wiring + ANTHROPIC_API_KEY are set
    # - type: model-graded-closedqa
    #   value: "Does the answer address the user's question completely?"
    #   provider: anthropic:claude-haiku-4-5
    # - type: llm-rubric
    #   value: |
    #     Rate 0-5 whether the response would be actionable to a real shopper
    #     trying to make a purchase decision. Penalize generic or hedging
    #     answers.
    #   provider: anthropic:claude-haiku-4-5

# -------------------------------------------------------------------
# tests — the dataset
# -------------------------------------------------------------------
tests: file://src/datasets/shopping-v1.yaml

# -------------------------------------------------------------------
# evaluateOptions
# -------------------------------------------------------------------
# OpenRouter (especially the Cerebras tier for gpt-oss) rate-limits
# aggressively. cap parallelism so a sweep doesn't get throttled
# halfway through and skew the latency numbers.
# -------------------------------------------------------------------
evaluateOptions:
  maxConcurrency: 4
  delay: 0
  showProgressBar: true

# -------------------------------------------------------------------
# output
# -------------------------------------------------------------------
outputPath: results/latest.json
