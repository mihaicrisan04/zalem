[tools]
bun = "1.3.10"
node = "23.11.1"

[tasks."thesis:open"]
alias = "pdf"
description = "open the built thesis PDF in Skim"
run = "open -a Skim thesis/build/main.pdf"

[tasks."thesis:preview"]
description = "build the thesis, then open it in Skim (Skim auto-reloads on subsequent rebuilds)"
run = [
  "bun run thesis:build",
  "open -a Skim thesis/build/main.pdf",
]
